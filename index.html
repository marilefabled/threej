<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ThreeJS Figure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07070f; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #ui {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; padding: 24px 0 32px;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      pointer-events: none;
    }

    #state-label {
      font-size: 1.15rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #aabbff;
      text-shadow: 0 0 28px #aabbff;
      transition: color 0.25s, text-shadow 0.25s;
    }

    #buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 760px;
      gap: 9px;
      pointer-events: all;
    }

    /* ── Theme picker (top center) ── */
    #theme-bar {
      position: fixed; top: 18px; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    #theme-bar .cap {
      font-size: 0.62rem; letter-spacing: 0.4em; text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    #swatches { display: flex; gap: 10px; pointer-events: all; }
    .sw {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--c);
      border: 2px solid rgba(255,255,255,0.25);
      cursor: pointer; padding: 0;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .sw:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.6); }
    .sw.active {
      border-color: #fff;
      box-shadow: 0 0 14px var(--c), 0 0 4px #fff;
      transform: scale(1.15);
    }

    .btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      padding: 10px 22px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
      user-select: none;
    }
    .btn:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.4);
      color: #fff;
    }
    .btn.active {
      background: rgba(255,255,255,0.1);
      border-color: var(--btn-color, #fff);
      color: var(--btn-color, #fff);
      box-shadow: 0 0 16px var(--btn-color, #fff), inset 0 0 10px rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>

<div id="theme-bar">
  <div class="cap">Theme</div>
  <div id="swatches"></div>
</div>

<div id="ui">
  <div id="state-label">IDLE</div>
  <div id="buttons">
    <button class="btn" data-anim="idle"  style="--btn-color:#aabbff">IDLE</button>
    <button class="btn" data-anim="wave"  style="--btn-color:#00ffaa">WAVE</button>
    <button class="btn" data-anim="dance" style="--btn-color:#ff6644">DANCE</button>
    <button class="btn" data-anim="spin"  style="--btn-color:#44aaff">SPIN</button>
    <button class="btn" data-anim="jump"  style="--btn-color:#ffcc22">JUMP</button>
    <button class="btn" data-anim="punch" style="--btn-color:#ff5533">PUNCH</button>
    <button class="btn" data-anim="flex"  style="--btn-color:#ffdd33">FLEX</button>
    <button class="btn" data-anim="walk"  style="--btn-color:#33ddff">WALK</button>
    <button class="btn" data-anim="think" style="--btn-color:#cc88ff">THINK</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

// ─── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07070f);
scene.fog = new THREE.Fog(0x07070f, 22, 55);

// ─── Camera ──────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.1, 100);
const BASE_CAM = new THREE.Vector3(0, 2.2, 8.5);
camera.position.copy(BASE_CAM);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.6, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.enablePan = false;
controls.minDistance = 3;
controls.maxDistance = 20;
controls.update();

// ─── Lights ──────────────────────────────────────────────────────────────────
// Ambient — enough to see the robot in shadow
scene.add(new THREE.AmbientLight(0x5577aa, 7.0));

// Key — sun from top-right-front
const sun = new THREE.DirectionalLight(0xffffff, 3.5);
sun.position.set(4, 9, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 30;
[-7, 7].forEach(v => {
  sun.shadow.camera.left = sun.shadow.camera.bottom = v < 0 ? v : undefined;
  sun.shadow.camera.right = sun.shadow.camera.top = v > 0 ? v : undefined;
});
sun.shadow.camera.left = sun.shadow.camera.bottom = -7;
sun.shadow.camera.right = sun.shadow.camera.top = 7;
scene.add(sun);

// Front fill — soft light from camera direction so face is lit
const fill = new THREE.DirectionalLight(0xaaccff, 3.5);
fill.position.set(0, 3, 8);
scene.add(fill);

// Left rim — cool blue edge light
const rimL = new THREE.PointLight(0x0077ff, 5, 14);
rimL.position.set(-4.5, 3.5, 1.5);
scene.add(rimL);

// Right rim — warm orange back-rim
const rimR = new THREE.PointLight(0xff4400, 3, 12);
rimR.position.set(4.5, 1.5, -2.5);
scene.add(rimR);

// Ground bounce — upward cyan glow from below robot
const bounce = new THREE.PointLight(0x0044cc, 2.5, 5);
bounce.position.set(0, 0.05, 0);
scene.add(bounce);

// ─── Floor ───────────────────────────────────────────────────────────────────
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshStandardMaterial({
    color: 0x0b0b18, roughness: 0.85, metalness: 0.3,
  })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// ─── Grid (two layers: coarse structure + fine subdivision) ──────────────────
// Fine grid — 1-unit cells, very faint
const gridFine = new THREE.GridHelper(80, 80, 0x0d1e3a, 0x0a182e);
gridFine.position.y = 0.001;
scene.add(gridFine);

// Coarse grid — 5-unit cells, more visible electric-blue
const gridCoarse = new THREE.GridHelper(80, 16, 0x1a4488, 0x122e66);
gridCoarse.position.y = 0.002;
scene.add(gridCoarse);

// Ground glow disc — subtle radial haze under robot
const glowDisc = new THREE.Mesh(
  new THREE.CircleGeometry(3.5, 64),
  new THREE.MeshBasicMaterial({ color: 0x2244bb, transparent: true, opacity: 0.13, depthWrite: false })
);
glowDisc.rotation.x = -Math.PI / 2;
glowDisc.position.y = 0.003;
scene.add(glowDisc);

// Ground ring — crisper inner ring
const groundRing = new THREE.Mesh(
  new THREE.RingGeometry(0.9, 1.05, 64),
  new THREE.MeshBasicMaterial({ color: 0x3366ff, transparent: true, opacity: 0.3, side: THREE.DoubleSide, depthWrite: false })
);
groundRing.rotation.x = -Math.PI / 2;
groundRing.position.y = 0.004;
scene.add(groundRing);

// ─── Materials ───────────────────────────────────────────────────────────────
// Palette: gunmetal grey + bright cyan accents — reads clearly on any dark bg
const M = {
  body:  new THREE.MeshStandardMaterial({
    color: 0x7799bb, roughness: 0.25, metalness: 0.7,
    emissive: 0x223355, emissiveIntensity: 0.6,
  }),
  head:  new THREE.MeshStandardMaterial({
    color: 0x88aacc, roughness: 0.2, metalness: 0.72,
    emissive: 0x2a4466, emissiveIntensity: 0.7,
  }),
  limb:  new THREE.MeshStandardMaterial({
    color: 0x5577aa, roughness: 0.3, metalness: 0.75,
    emissive: 0x162244, emissiveIntensity: 0.5,
  }),
  joint: new THREE.MeshStandardMaterial({
    color: 0xaabbd0, roughness: 0.45, metalness: 0.55,
    emissive: 0x334455, emissiveIntensity: 0.3,
  }),
  panel: new THREE.MeshStandardMaterial({
    color: 0x334455, roughness: 0.6, metalness: 0.5,
    emissive: 0x111e2e, emissiveIntensity: 0.4,
  }),
  eye:   new THREE.MeshStandardMaterial({
    color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 4.0, roughness: 0, metalness: 0,
  }),
  glow:  new THREE.MeshStandardMaterial({
    color: 0x22eeff, emissive: 0x22eeff, emissiveIntensity: 2.5, roughness: 0,
  }),
};

// ─── Figure ──────────────────────────────────────────────────────────────────
const fig = new THREE.Group();
scene.add(fig);

function mesh(geo, mat) {
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

// ── Torso ──
const torsoGroup = new THREE.Group();
torsoGroup.position.y = 1.45;
fig.add(torsoGroup);

const torsoMesh = mesh(new THREE.BoxGeometry(0.76, 0.92, 0.44), M.body);
torsoGroup.add(torsoMesh);

// Chest panel recess
const chestPanel = mesh(new THREE.BoxGeometry(0.38, 0.46, 0.44), M.panel);
chestPanel.position.z = 0.001;
torsoGroup.add(chestPanel);

// Vertical spine strip
const spine = mesh(new THREE.BoxGeometry(0.06, 0.5, 0.445), M.panel);
torsoGroup.add(spine);

// Chest core dot
const chestDot = mesh(new THREE.SphereGeometry(0.075, 16, 16), M.glow);
chestDot.position.z = 0.225;
torsoGroup.add(chestDot);

// Shoulder pads
[-1, 1].forEach(s => {
  const pad = mesh(new THREE.BoxGeometry(0.14, 0.16, 0.36), M.panel);
  pad.position.set(s * 0.39, 0.32, 0);
  torsoGroup.add(pad);
});

// ── Hips ──
const hipsGroup = new THREE.Group();
hipsGroup.position.y = 0.93;
fig.add(hipsGroup);
const hipsMesh = mesh(new THREE.BoxGeometry(0.64, 0.24, 0.4), M.body);
hipsGroup.add(hipsMesh);
// Hip side plates
[-1, 1].forEach(s => {
  const plate = mesh(new THREE.BoxGeometry(0.1, 0.2, 0.38), M.panel);
  plate.position.x = s * 0.28;
  hipsGroup.add(plate);
});

// ── Neck ──
const neck = mesh(new THREE.CylinderGeometry(0.09, 0.12, 0.2, 10), M.joint);
neck.position.y = 1.9;
fig.add(neck);

// ── Head ──
const headGroup = new THREE.Group();
headGroup.position.y = 2.1;
fig.add(headGroup);

const headMesh = mesh(new THREE.BoxGeometry(0.6, 0.56, 0.5), M.head);
headMesh.position.y = 0.28;
headGroup.add(headMesh);

// Visor panel
const visor = mesh(new THREE.BoxGeometry(0.5, 0.18, 0.5), M.panel);
visor.position.set(0, 0.32, 0.001);
headGroup.add(visor);

// Eyes
const eyeHalos = [];
[-0.13, 0.13].forEach(x => {
  const e = mesh(new THREE.SphereGeometry(0.068, 12, 12), M.eye);
  e.position.set(x, 0.33, 0.26);
  headGroup.add(e);
  // Eye glow halo (slightly larger, transparent)
  const halo = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.12 })
  );
  halo.position.copy(e.position);
  headGroup.add(halo);
  eyeHalos.push(halo);
});

// Mouth grill
for (let i = 0; i < 4; i++) {
  const slit = mesh(new THREE.BoxGeometry(0.28, 0.028, 0.5), M.panel);
  slit.position.set(0, 0.08 + i * 0.048, 0);
  headGroup.add(slit);
}

// Ear vents
[-1, 1].forEach(s => {
  const ear = mesh(new THREE.BoxGeometry(0.06, 0.2, 0.3), M.panel);
  ear.position.set(s * 0.3, 0.28, 0);
  headGroup.add(ear);
});

// Antenna
const antenna = mesh(new THREE.CylinderGeometry(0.016, 0.016, 0.3, 8), M.joint);
antenna.position.y = 0.71;
headGroup.add(antenna);
const antBall = mesh(new THREE.SphereGeometry(0.058, 12, 12), M.glow);
antBall.position.y = 0.86;
headGroup.add(antBall);

// ── Arms ──
function makeArm(sign) {
  const root = new THREE.Group();
  root.position.set(sign * 0.52, 1.62, 0);   // shoulder pivot near top of torso
  fig.add(root);

  // Shoulder sphere
  const shoulder = mesh(new THREE.SphereGeometry(0.11, 10, 10), M.joint);
  root.add(shoulder);

  // Upper arm
  const upper = mesh(new THREE.CylinderGeometry(0.088, 0.082, 0.42, 10), M.limb);
  upper.position.y = -0.23;
  root.add(upper);

  // Elbow
  const elbow = mesh(new THREE.SphereGeometry(0.092, 10, 10), M.joint);
  elbow.position.y = -0.45;
  root.add(elbow);

  // Forearm group (pivot at elbow)
  const foreGroup = new THREE.Group();
  foreGroup.position.y = -0.45;
  root.add(foreGroup);

  const fore = mesh(new THREE.CylinderGeometry(0.068, 0.06, 0.36, 10), M.limb);
  fore.position.y = -0.19;
  foreGroup.add(fore);

  // Wrist
  const wrist = mesh(new THREE.SphereGeometry(0.065, 8, 8), M.joint);
  wrist.position.y = -0.39;
  foreGroup.add(wrist);

  // Hand (blocky fist)
  const hand = mesh(new THREE.BoxGeometry(0.15, 0.15, 0.1), M.body);
  hand.position.y = -0.5;
  foreGroup.add(hand);

  return { root, foreGroup };
}

const LA = makeArm(-1);
const RA = makeArm(1);

// ── Legs ──
function makeLeg(sign) {
  const root = new THREE.Group();
  root.position.set(sign * 0.22, 0.93, 0);
  fig.add(root);

  // Upper leg
  const upper = mesh(new THREE.CylinderGeometry(0.115, 0.105, 0.46, 10), M.limb);
  upper.position.y = -0.24;
  root.add(upper);

  // Knee
  const knee = mesh(new THREE.SphereGeometry(0.11, 10, 10), M.joint);
  knee.position.y = -0.48;
  root.add(knee);

  // Lower leg group
  const lowerGroup = new THREE.Group();
  lowerGroup.position.y = -0.48;
  root.add(lowerGroup);

  const lower = mesh(new THREE.CylinderGeometry(0.08, 0.072, 0.4, 10), M.limb);
  lower.position.y = -0.21;
  lowerGroup.add(lower);

  // Ankle
  const ankle = mesh(new THREE.SphereGeometry(0.075, 8, 8), M.joint);
  ankle.position.y = -0.43;
  lowerGroup.add(ankle);

  // Foot
  const foot = mesh(new THREE.BoxGeometry(0.18, 0.1, 0.3), M.body);
  foot.position.set(0, -0.5, 0.07);
  lowerGroup.add(foot);

  // Foot toe plate
  const toe = mesh(new THREE.BoxGeometry(0.16, 0.06, 0.08), M.panel);
  toe.position.set(0, -0.5, 0.25);
  lowerGroup.add(toe);

  return { root, lowerGroup };
}

const LL = makeLeg(-1);
const RL = makeLeg(1);

// ─── Per-animation label color (button identity) ─────────────────────────────
const ANIM_COLORS = {
  idle:  '#aabbff', wave:  '#00ffaa', dance: '#ff6644', spin:  '#44aaff',
  jump:  '#ffcc22', punch: '#ff5533', flex:  '#ffdd33', walk:  '#33ddff',
  think: '#cc88ff',
};

// ─── Camera zoom targets ──────────────────────────────────────────────────────
const ZOOM_TARGETS = {
  idle:  new THREE.Vector3(0,    2.2,  8.5),
  wave:  new THREE.Vector3(-1.5, 2.8,  5.5),
  dance: new THREE.Vector3(0,    1.5,  5.0),
  spin:  new THREE.Vector3(1.5,  3.0,  5.0),
  jump:  new THREE.Vector3(0,    4.5,  6.5),
  punch: new THREE.Vector3(1.6,  2.4,  5.2),
  flex:  new THREE.Vector3(0,    2.2,  4.8),
  walk:  new THREE.Vector3(2.6,  2.6,  6.0),
  think: new THREE.Vector3(-1.2, 2.9,  4.8),
};

// ─── Color themes ─────────────────────────────────────────────────────────────
// Each theme recolors the robot materials, eyes/glow accent, and ground glow.
const THEMES = [
  { name: 'Steel',   accent: 0x22eeff, eye: 0x00ffff, ground: 0x3366ff,
    body: 0x7799bb, head: 0x88aacc, limb: 0x5577aa, joint: 0xaabbd0, panel: 0x334455 },
  { name: 'Crimson', accent: 0xff4455, eye: 0xff5566, ground: 0xff3355,
    body: 0xbb5566, head: 0xcc6677, limb: 0xaa4455, joint: 0xdd99aa, panel: 0x552233 },
  { name: 'Emerald', accent: 0x33ffaa, eye: 0x44ffbb, ground: 0x00ff88,
    body: 0x55aa88, head: 0x66bb99, limb: 0x449977, joint: 0x99ddbb, panel: 0x224433 },
  { name: 'Gold',    accent: 0xffcc22, eye: 0xffdd44, ground: 0xffaa22,
    body: 0xbb9955, head: 0xccaa66, limb: 0xaa8844, joint: 0xddccaa, panel: 0x554422 },
  { name: 'Violet',  accent: 0xcc66ff, eye: 0xdd88ff, ground: 0xaa44ff,
    body: 0x8866bb, head: 0x9977cc, limb: 0x7755aa, joint: 0xbbaadd, panel: 0x332255 },
  { name: 'Mono',    accent: 0xffffff, eye: 0xffffff, ground: 0xccddee,
    body: 0xaab0b8, head: 0xc0c6ce, limb: 0x889098, joint: 0xd8dde2, panel: 0x444a52 },
];

function applyTheme(th) {
  M.body.color.setHex(th.body);
  M.head.color.setHex(th.head);
  M.limb.color.setHex(th.limb);
  M.joint.color.setHex(th.joint);
  M.panel.color.setHex(th.panel);
  M.eye.color.setHex(th.eye);   M.eye.emissive.setHex(th.eye);
  M.glow.color.setHex(th.accent); M.glow.emissive.setHex(th.accent);
  eyeHalos.forEach(h => h.material.color.setHex(th.eye));
  groundRing.material.color.setHex(th.ground);
  glowDisc.material.color.setHex(th.ground);
  bounce.color.setHex(th.ground);
}

// Build swatch buttons
const swatchWrap = document.getElementById('swatches');
THEMES.forEach((th, i) => {
  const b = document.createElement('button');
  b.className = 'sw';
  b.style.setProperty('--c', '#' + th.accent.toString(16).padStart(6, '0'));
  b.title = th.name;
  b.addEventListener('click', () => {
    applyTheme(th);
    swatchWrap.querySelectorAll('.sw').forEach((s, j) => s.classList.toggle('active', j === i));
  });
  swatchWrap.appendChild(b);
});

// ─── State ───────────────────────────────────────────────────────────────────
let curAnim = 'idle';
let animTime = 0;

const stateLabel = document.getElementById('state-label');
const btns = document.querySelectorAll('.btn');

function setAnim(name) {
  curAnim = name;
  animTime = 0;

  const col = ANIM_COLORS[name];
  stateLabel.textContent = name.toUpperCase();
  stateLabel.style.color = col;
  stateLabel.style.textShadow = `0 0 28px ${col}`;
  btns.forEach(b => b.classList.toggle('active', b.dataset.anim === name));

  zoomFrom.copy(camera.position);
  zoomTo.copy(ZOOM_TARGETS[name]);
  zoomT = 0;
  controls.enabled = false;
}

let zoomFrom = BASE_CAM.clone();
let zoomTo   = BASE_CAM.clone();
let zoomT    = 1;

btns.forEach(b => b.addEventListener('click', () => setAnim(b.dataset.anim)));

// Initialise: first theme active, idle animation
applyTheme(THEMES[0]);
swatchWrap.querySelector('.sw').classList.add('active');
setAnim('idle');

// ─── Helpers ─────────────────────────────────────────────────────────────────
function easeIO(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

// Arms hang DOWN by default. Positive Z swings an arm toward body center,
// negative Z swings it away. So to raise arms OUT to the sides at shoulder
// level: left arm = -ARM_SIDE, right arm = +ARM_SIDE.
const ARM_SIDE = Math.PI * 0.5;   // 90° — arms straight out, true shoulder level

function resetFig() {
  fig.position.y = 0;
  fig.rotation.set(0, 0, 0);
  torsoGroup.rotation.set(0, 0, 0);
  torsoGroup.scale.set(1, 1, 1);
  headGroup.rotation.set(0, 0, 0);
  LA.root.rotation.set(0, 0, -ARM_SIDE);   // arms out to sides, shoulder level
  RA.root.rotation.set(0, 0,  ARM_SIDE);
  LA.foreGroup.rotation.set(0, 0, 0);
  RA.foreGroup.rotation.set(0, 0, 0);
  LL.root.rotation.set(0, 0, 0);
  RL.root.rotation.set(0, 0, 0);
  LL.lowerGroup.rotation.set(0, 0, 0);
  RL.lowerGroup.rotation.set(0, 0, 0);
}

// ─── Render loop ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const ZOOM_IN = 0.45, HOLD = 0.9, ZOOM_OUT = 0.5;
const ZOOM_TOTAL = ZOOM_IN + HOLD + ZOOM_OUT;

renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();
  animTime += dt;
  const t = animTime;

  resetFig();

  // ── Animations ──────────────────────────────────────────────────────────────
  switch (curAnim) {
    case 'idle': {
      const b = Math.sin(t * 1.3) * 0.03;
      torsoGroup.scale.y = 1 + b;
      headGroup.rotation.y = Math.sin(t * 0.55) * 0.14;
      LA.root.rotation.z  = -ARM_SIDE + Math.sin(t * 1.3) * 0.05;
      RA.root.rotation.z  =  ARM_SIDE - Math.sin(t * 1.3) * 0.05;
      fig.position.y = Math.sin(t * 1.3) * 0.02;
      antBall.material.emissiveIntensity = 0.8 + Math.sin(t * 2) * 0.5;
      M.glow.emissiveIntensity = 1.0 + Math.sin(t * 1.8) * 0.25;
      break;
    }
    case 'wave': {
      // Right arm relaxed at shoulder; left arm raised high and waving
      RA.root.rotation.z = ARM_SIDE;
      LA.root.rotation.z = -Math.PI * 0.82;                    // raised up and out
      LA.foreGroup.rotation.z = -0.2 + Math.sin(t * 6) * 0.5;  // forearm swings = wave
      headGroup.rotation.y = Math.sin(t * 2) * 0.22;
      headGroup.rotation.z = Math.sin(t * 2) * 0.05;
      fig.position.y = Math.sin(t * 2.5) * 0.025;
      antBall.material.emissiveIntensity = 1.8 + Math.sin(t * 5) * 0.4;
      M.glow.emissiveIntensity = 1.4 + Math.sin(t * 5) * 0.5;
      break;
    }
    case 'dance': {
      const s = Math.sin(t * 3.5);
      fig.rotation.y          = s * 0.25;
      torsoGroup.rotation.z   = s * 0.14;
      torsoGroup.rotation.x   = Math.sin(t * 3.5 + 0.5) * 0.07;
      headGroup.rotation.z    = -s * 0.12;
      headGroup.rotation.y    = Math.sin(t * 3.5 + 1) * 0.2;
      LA.root.rotation.z      = -(ARM_SIDE + s * 0.4);   // pump arms from shoulder
      RA.root.rotation.z      =   ARM_SIDE + s * 0.4;
      LA.root.rotation.x      =  s * 0.4;
      RA.root.rotation.x      = -s * 0.4;
      LL.root.rotation.x      =  s * 0.28;
      RL.root.rotation.x      = -s * 0.28;
      fig.position.y = Math.abs(s) * 0.12;
      antBall.material.emissiveIntensity = 1.2 + Math.abs(s) * 1.2;
      M.glow.emissiveIntensity = 1.3 + Math.abs(s) * 0.6;
      break;
    }
    case 'spin': {
      fig.rotation.y   = t * 4.5;
      LA.root.rotation.z = -Math.PI * 0.5;   // full T-pose
      RA.root.rotation.z =  Math.PI * 0.5;
      LA.root.rotation.x = -0.2;
      RA.root.rotation.x = -0.2;
      fig.position.y = Math.sin(t * 9) * 0.04;
      antBall.material.emissiveIntensity = 2.2;
      M.glow.emissiveIntensity = 1.8;
      break;
    }
    case 'jump': {
      const phase = t * 1.8 % (Math.PI * 2);
      const h = Math.max(0, Math.sin(phase));
      fig.position.y = h * 1.4;
      if (h > 0.05) {
        LL.root.rotation.x       =  0.45;
        RL.root.rotation.x       =  0.45;
        LL.lowerGroup.rotation.x = -0.65;
        RL.lowerGroup.rotation.x = -0.65;
        LA.root.rotation.x       = -0.7;
        RA.root.rotation.x       = -0.7;
        LA.root.rotation.z       = -ARM_SIDE;
        RA.root.rotation.z       =  ARM_SIDE;
        fig.rotation.x = Math.sin(phase) * 0.1;
      } else {
        LL.root.rotation.x = -0.1;
        RL.root.rotation.x = -0.1;
      }
      antBall.material.emissiveIntensity = 0.8 + h * 1.8;
      M.glow.emissiveIntensity = 1.0 + h * 0.8;
      break;
    }
    case 'punch': {
      // Alternating boxing jabs with a torso twist into each punch
      const sp = t * 7;
      const lp = Math.max(0, Math.sin(sp));
      const rp = Math.max(0, Math.sin(sp + Math.PI));
      fig.rotation.y = (lp - rp) * 0.2;
      // Upper arms forward, elbows bent then snapping straight on the punch
      LA.root.rotation.z = -0.3;
      RA.root.rotation.z =  0.3;
      LA.root.rotation.x = -Math.PI * 0.5;
      RA.root.rotation.x = -Math.PI * 0.5;
      LA.foreGroup.rotation.x = -1.5 + lp * 1.5;
      RA.foreGroup.rotation.x = -1.5 + rp * 1.5;
      headGroup.rotation.y = (lp - rp) * 0.15;
      fig.position.y = Math.abs(Math.sin(sp)) * 0.03;
      antBall.material.emissiveIntensity = 1.0 + (lp + rp) * 1.0;
      M.glow.emissiveIntensity = 1.2 + (lp + rp) * 0.6;
      break;
    }
    case 'flex': {
      // Double-biceps pose: arms out, forearms curled up, showing off with a twist
      const f = Math.sin(t * 2);
      LA.root.rotation.z = -ARM_SIDE;
      RA.root.rotation.z =  ARM_SIDE;
      LA.root.rotation.x = -0.25;
      RA.root.rotation.x = -0.25;
      LA.foreGroup.rotation.x = -2.4 + Math.sin(t * 4) * 0.08;   // bicep flex
      RA.foreGroup.rotation.x = -2.4 + Math.sin(t * 4) * 0.08;
      torsoGroup.rotation.y = f * 0.18;
      headGroup.rotation.y  = f * 0.22;
      fig.position.y = Math.abs(f) * 0.03;
      antBall.material.emissiveIntensity = 1.4 + Math.abs(Math.sin(t * 4)) * 1.2;
      M.glow.emissiveIntensity = 1.3 + Math.abs(f) * 0.5;
      break;
    }
    case 'walk': {
      // March in place: legs lift and bend, arms swing in opposition
      const w = t * 4.2;
      const sw = Math.sin(w);
      LL.root.rotation.x =  sw * 0.55;
      RL.root.rotation.x = -sw * 0.55;
      LL.lowerGroup.rotation.x = Math.max(0, -sw) * 0.7;
      RL.lowerGroup.rotation.x = Math.max(0,  sw) * 0.7;
      LA.root.rotation.z = -ARM_SIDE * 0.22;
      RA.root.rotation.z =  ARM_SIDE * 0.22;
      LA.root.rotation.x = -sw * 0.5;
      RA.root.rotation.x =  sw * 0.5;
      headGroup.rotation.y = sw * 0.06;
      fig.position.y = Math.abs(Math.sin(w * 2)) * 0.04;
      antBall.material.emissiveIntensity = 1.0 + Math.abs(sw) * 0.6;
      M.glow.emissiveIntensity = 1.1 + Math.abs(sw) * 0.3;
      break;
    }
    case 'think': {
      // Hand to chin, head tilted, pondering sway
      RA.root.rotation.z = 0.45;
      RA.root.rotation.x = -Math.PI * 0.62;
      RA.foreGroup.rotation.x = -1.7;                 // forearm up toward chin
      LA.root.rotation.z = -ARM_SIDE * 0.5;           // other arm relaxed lower
      LA.root.rotation.x = -0.15;
      headGroup.rotation.z = 0.16;
      headGroup.rotation.x = 0.13;
      headGroup.rotation.y = Math.sin(t * 0.9) * 0.12;
      fig.position.y = Math.sin(t * 1.2) * 0.015;
      antBall.material.emissiveIntensity = 0.5 + Math.sin(t * 2.5) * 0.3;
      M.glow.emissiveIntensity = 0.9 + Math.sin(t * 1.5) * 0.2;
      break;
    }
  }

  // ── Animated lights + ground effects ────────────────────────────────────────
  rimL.intensity = 4 + Math.sin(t * 0.7) * 1.2;
  rimR.intensity = 2.5 + Math.sin(t * 0.9 + 1) * 0.8;
  bounce.intensity = 2.0 + Math.sin(t * 2.2) * 0.6;

  // Ground glow ring pulse
  groundRing.material.opacity = 0.22 + Math.sin(t * 2) * 0.1;
  glowDisc.material.opacity   = 0.1  + Math.sin(t * 1.5) * 0.04;

  // ── Camera zoom ──────────────────────────────────────────────────────────────
  if (zoomT < 1) {
    zoomT = Math.min(1, zoomT + dt / ZOOM_TOTAL);
    const inF  = Math.min(1, zoomT / (ZOOM_IN / ZOOM_TOTAL));
    const outF = Math.max(0, (zoomT - (ZOOM_IN + HOLD) / ZOOM_TOTAL) / (ZOOM_OUT / ZOOM_TOTAL));
    const blend = outF > 0 ? 1 - easeIO(outF) : easeIO(inF);

    camera.position.lerpVectors(zoomFrom, zoomTo, blend);
    if (curAnim !== 'spin') camera.lookAt(0, 1.6, 0);

    if (zoomT >= 1) {
      controls.enabled = true;
      camera.position.copy(BASE_CAM);
      controls.update();
    }
  } else {
    controls.update();
  }

  renderer.render(scene, camera);
});

// ─── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
