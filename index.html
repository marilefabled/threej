<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ThreeJS Figure</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<div id="jail-bar">
  <label class="field">
    <span class="cap">Location</span>
    <select id="location-select"></select>
  </label>
  <label class="field">
    <span class="cap">Period</span>
    <select id="period-select">
      <option value="dawn">Dawn</option>
      <option value="day">Day</option>
      <option value="dusk">Dusk</option>
      <option value="night" selected>Night</option>
    </select>
  </label>
  <label class="field">
    <span class="cap">Mood</span>
    <select id="mood-select">
      <option value="neutral" selected>Neutral</option>
      <option value="danger">Danger</option>
      <option value="social">Social</option>
      <option value="discovery">Discovery</option>
      <option value="calm">Calm</option>
    </select>
  </label>
  <label class="field">
    <span class="cap">Ghost</span>
    <select id="ghost-select"></select>
  </label>
</div>

<div id="theme-bar">
  <div class="cap">Theme</div>
  <div id="swatches"></div>
</div>

<div id="ui">
  <div id="state-label">IDLE</div>
  <div id="buttons">
    <button class="btn" data-anim="idle"  style="--btn-color:#aabbff">IDLE</button>
    <button class="btn" data-anim="wave"  style="--btn-color:#00ffaa">WAVE</button>
    <button class="btn" data-anim="dance" style="--btn-color:#ff6644">DANCE</button>
    <button class="btn" data-anim="spin"  style="--btn-color:#44aaff">SPIN</button>
    <button class="btn" data-anim="jump"  style="--btn-color:#ffcc22">JUMP</button>
    <button class="btn" data-anim="punch" style="--btn-color:#ff5533">PUNCH</button>
    <button class="btn" data-anim="flex"  style="--btn-color:#ffdd33">FLEX</button>
    <button class="btn" data-anim="walk"  style="--btn-color:#33ddff">WALK</button>
    <button class="btn" data-anim="think" style="--btn-color:#cc88ff">THINK</button>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
